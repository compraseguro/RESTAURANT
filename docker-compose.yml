# Uso rápido:
#   1) Crear archivo .env junto a este YAML con al menos: JWT_SECRET=tu_secreto_largo
#   2) (Recomendado) Montar credenciales del bot — ver volumen comentado bot.env y certificado .pfx
#   3) docker compose up --build
#
# EFACT_API_URL en el servicio app apunta al bot Python del mismo contenedor (ver entrypoint).
# Opcional: defina también EFACT_HTTP_SECRET en .env junto a este YAML (mismo valor que en bot/.env).

services:
  app:
    build: .
    ports:
      - "${HOST_PORT:-3001}:3001"
      # Descomenta para depurar el API del bot desde tu PC:
      # - "8765:8765"
    environment:
      JWT_SECRET: ${JWT_SECRET:?Defina JWT_SECRET en .env}
      PORT: "3001"
      DB_PATH: /data/restaurant.db
      NODE_ENV: production
      # Heredan al proceso Python vía entrypoint (dotenv del bot puede sobrescribir)
      EFACT_HTTP_HOST: "0.0.0.0"
      EFACT_HTTP_PORT: "8765"
      OUTPUT_DIR: /data/efact-output
      # Bot Python en el mismo contenedor (entrypoint); Node usa esta URL sin configurar el panel
      EFACT_API_URL: http://127.0.0.1:8765
      # Opcional: mismo valor en .env del bot (EFACT_HTTP_SECRET) y aquí
      EFACT_HTTP_SECRET: ${EFACT_HTTP_SECRET:-}
      # Cierre de caja → Formspree (override en .env junto a este YAML)
      CASH_CLOSE_NOTIFY_ENABLED: ${CASH_CLOSE_NOTIFY_ENABLED:-1}
      CASH_CLOSE_FORM_URL: ${CASH_CLOSE_FORM_URL:-https://formspree.io/f/mlgpdblo}
      CASH_CLOSE_EMAIL: ${CASH_CLOSE_EMAIL:-}
      # Token https://decolecta.com/profile — consulta RUC/DNI en caja (botón Padrón)
      PERU_CONSULTAS_TOKEN: ${PERU_CONSULTAS_TOKEN:-}
    volumes:
      - restaurant_data:/data
      # Bot: copia BOT DE FACTURACION/.env.example a docker/bot.env, completa y descomenta:
      # - ./docker/bot.env:/app/bot/.env:ro
      # - ./docker/certs:/data/certs:ro
    restart: unless-stopped

volumes:
  restaurant_data:
